---
new_page_extension: md
auto_deploy: false
admin_path: 
webhook_url: 
sections:
- type: jekyll-pages
  label: Pages
  create: all
- type: jekyll-posts
  label: Posts
  create: all
upload_dir: uploads
public_path: "/uploads"
front_matter_path: ''
use_front_matter_path: false
file_template: ":filename:"
build:
  preview_env:
  - JEKYLL_ENV=staging
  preview_output_directory: _site
  preview_docker_image: lakruzz/jekyll-plus
  mount_path: _site
  working_dir: "/app"
  instant_preview_command: " jekyll serve --drafts --unpublished --future --port 8080
    --watch --host 0.0.0.0 -d _site"
